services:
  app_db:
    image: pgvector/pgvector:pg17
    container_name: vda_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bi_app
    ports:
      - "5432:5432"
    volumes:
      - app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bi_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  warehouse_db:
    image: pgvector/pgvector:pg17
    container_name: vda_warehouse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bi_warehouse
    ports:
      - "5433:5432"
    volumes:
      - warehouse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bi_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app_pgdata:
  warehouse_pgdata:
